<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Analyzer</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body, html {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f0f4f8;
    flex-direction: column;
    padding: 20px;
}

h1.title {
    font-size: 36px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(90deg, #007BFF, #00C6FF);
    padding: 15px 25px;
    border-radius: 12px;
    margin-bottom: 30px;
}

.form-group {
    background: #fff;
    padding: 30px 40px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 420px;
}

.password-container {
    position: relative;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px 44px 12px 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
}

input:focus {
    border-color: #007BFF;
    outline: none;
}

/* Eye toggle – FIX #12: two separate SVG paths swapped on click */
.eye-toggle {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    cursor: pointer;
    width: 22px;
    height: 22px;
    fill: #007BFF;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: opacity 0.2s;
}

button:hover { opacity: 0.85; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.check-btn    { background: #007BFF; color: white; }
.generate-btn { background: #00C6FF; color: white; }

/* Copy row – FIX #14: clipboard copy for generated password */
.copy-row {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
}

.copy-row input {
    flex: 1;
    margin-bottom: 0;
    font-family: monospace;
    background: #f0f4f8;
}

.copy-btn {
    width: auto;
    padding: 10px 14px;
    margin-top: 0;
    background: #6c757d;
    color: white;
    font-size: 13px;
    white-space: nowrap;
}

select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* FIX #17: result hidden by default */
#result {
    background: #f9f9f9;
    padding: 12px;
    border-radius: 8px;
    margin-top: 20px;
    font-family: monospace;
    font-size: 13px;
    display: none;
}

/* Error banner – FIX #15 */
#error-banner {
    display: none;
    background: #ffdddd;
    color: #b30000;
    padding: 10px 14px;
    border-radius: 8px;
    margin-top: 14px;
    font-size: 13px;
}

#suggestions { margin-top: 10px; padding-left: 20px; }
#suggestions li { margin-bottom: 4px; font-size: 13px; }

/* Strength badge */
#strength-badge {
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
    font-weight: bold;
    text-align: center;
    display: none;
}

.very-weak  { background: #ffdddd; color: #b30000; }
.weak       { background: #ffdddd; color: #b30000; }
.fair       { background: #fff0cc; color: #805500; }
.strong     { background: #ddffdd; color: #006600; }
.very-strong{ background: #d6f5ff; color: #004d66; }

#entropy-info {
    margin-top: 8px;
    font-size: 13px;
    color: #333;
    display: none;
}

#similarity-info {
    margin-top: 6px;
    font-size: 13px;
    color: #555;
    display: none;
}

.suggestions-header {
    margin-top: 16px;
    font-size: 14px;
    font-weight: 600;
    display: none;
}
</style>
</head>

<body>

<h1 class="title">Password Analyzer</h1>

<div class="form-group">

    <!-- Current password -->
    <div class="password-container">
        <input type="password" id="password" placeholder="Enter password">
        <!-- FIX #12: proper open-eye SVG -->
        <svg class="eye-toggle" id="eye-password" onclick="togglePassword('password', 'eye-password')" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path class="eye-open" d="M12 5C7.636 5 3.998 7.9 2 12c1.998 4.1 5.636 7 10 7s8.002-2.9 10-7c-1.998-4.1-5.636-7-10-7zm0 11.5a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9zm0-7a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5z"/>
            <!-- Slash line shown when password is hidden -->
            <line class="eye-slash" x1="3" y1="3" x2="21" y2="21" stroke="#007BFF" stroke-width="2" stroke-linecap="round" style="display:none"/>
        </svg>
    </div>

    <!-- Previous password -->
    <div class="password-container">
        <input type="password" id="previous" placeholder="Previous password (optional)">
        <svg class="eye-toggle" id="eye-previous" onclick="togglePassword('previous', 'eye-previous')" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path class="eye-open" d="M12 5C7.636 5 3.998 7.9 2 12c1.998 4.1 5.636 7 10 7s8.002-2.9 10-7c-1.998-4.1-5.636-7-10-7zm0 11.5a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9zm0-7a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5z"/>
            <line class="eye-slash" x1="3" y1="3" x2="21" y2="21" stroke="#007BFF" stroke-width="2" stroke-linecap="round" style="display:none"/>
        </svg>
    </div>

    <!-- Mode selector – FIX #11: actually works now backend handles it -->
    <select id="mode">
        <option value="balanced">Balanced (16 chars)</option>
        <option value="memorable">Memorable (20 chars, no symbols)</option>
        <option value="strong">Very Strong (24 chars, full symbols)</option>
    </select>

    <button class="generate-btn" onclick="generatePassword()">Generate Password</button>

    <!-- FIX #13 + #14: visible generated password with copy button -->
    <div class="copy-row" id="copy-row">
        <input type="text" id="generated-display" readonly>
        <button class="copy-btn" onclick="copyGenerated()">Copy</button>
    </div>

    <button class="check-btn" onclick="analyzePassword()">Check Password</button>

    <!-- FIX #15: structured error display -->
    <div id="error-banner"></div>

    <!-- FIX #17: hidden until there's a result -->
    <pre id="result"></pre>
    <div id="strength-badge"></div>
    <p id="entropy-info"></p>
    <p id="similarity-info"></p>

    <h3 class="suggestions-header" id="suggestions-header">Suggestions:</h3>
    <ul id="suggestions"></ul>

</div>

<script>
// =========================================================
// FIX #12 – Proper eye toggle with visual state
// =========================================================
function togglePassword(inputId, svgId) {
    const input = document.getElementById(inputId);
    const svg   = document.getElementById(svgId);
    const slash = svg.querySelector('.eye-slash');

    if (input.type === "password") {
        input.type = "text";
        slash.style.display = "block";   // show slash → "currently visible"
    } else {
        input.type = "password";
        slash.style.display = "none";    // hide slash → "currently hidden"
    }
}

// =========================================================
// FIX #14 – Copy generated password to clipboard
// =========================================================
function copyGenerated() {
    const val = document.getElementById('generated-display').value;
    if (!val) return;
    navigator.clipboard.writeText(val).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = "Copied!";
        setTimeout(() => btn.textContent = "Copy", 1500);
    }).catch(() => {
        // Fallback for older browsers
        document.getElementById('generated-display').select();
        document.execCommand('copy');
    });
}

// =========================================================
// FIX #15 – Structured error display helper
// =========================================================
function showError(msg) {
    const banner = document.getElementById('error-banner');
    banner.textContent = msg;
    banner.style.display = 'block';
}

function clearError() {
    const banner = document.getElementById('error-banner');
    banner.textContent = '';
    banner.style.display = 'none';
}

// =========================================================
// FIX #1 / #11 – Generate Password with working mode param
// =========================================================
async function generatePassword() {
    const mode = document.getElementById('mode').value;
    clearError();

    try {
        const res = await fetch(`/generate?mode=${encodeURIComponent(mode)}`);

        // FIX #15 – inspect response status before using data
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            showError(err.error || `Generation failed (${res.status})`);
            return;
        }

        const data = await res.json();
        const pwd  = data.generated_password;

        // FIX #13 – show generated password in visible readonly field
        const copyRow = document.getElementById('copy-row');
        const display = document.getElementById('generated-display');
        display.value = pwd;
        copyRow.style.display = 'flex';

        // Also populate the main password field for analysis
        document.getElementById('password').value = pwd;

        // FIX #13 – reveal the main password field so user can see it
        const mainInput = document.getElementById('password');
        mainInput.type = 'text';
        const slash = document.getElementById('eye-password').querySelector('.eye-slash');
        slash.style.display = 'block';

        // Auto-analyze
        analyzePassword();

    } catch (err) {
        showError("Network error — could not generate password.");
    }
}

// =========================================================
// Analyze Password
// =========================================================
async function analyzePassword() {
    const password = document.getElementById('password').value;
    const previous = document.getElementById('previous').value;
    clearError();

    if (!password) {
        showError("Please enter a password.");
        return;
    }

    try {
        const res = await fetch('/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password, previous })
        });

        // FIX #15 – handle non-200 responses properly
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            showError(err.error || `Analysis failed (${res.status})`);
            return;
        }

        const data = await res.json();

        // --- Core result block (FIX #17: unhide) ---
        const resultEl = document.getElementById('result');
        resultEl.style.display = 'block';

        let resultText = `Score:    ${data.score}/4\n`;
        resultText    += `Breaches: ${data.breach_count >= 0 ? data.breach_count.toLocaleString() : 'API unavailable'}\n`;

        // FIX #3 – show N/A when no previous password was provided
        if (data.similarity !== null && data.similarity !== undefined) {
            resultText += `Similarity to previous: ${(data.similarity * 100).toFixed(0)}%`;
        } else {
            resultText += `Similarity to previous: N/A`;
        }

        resultEl.textContent = resultText;

        // --- Strength badge ---
        const badge = document.getElementById("strength-badge");
        badge.style.display = 'block';
        badge.textContent = `Strength: ${data.strength_label}`;
        badge.className = '';

        const labelMap = {
            "Very Weak": "very-weak",
            "Weak":      "weak",
            "Fair":      "fair",
            "Strong":    "strong",
            "Very Strong":"very-strong"
        };
        badge.classList.add(labelMap[data.strength_label] || "weak");

        // --- Entropy (FIX #4 – now shows calibrated explanation) ---
        const entropyEl = document.getElementById("entropy-info");
        entropyEl.style.display = 'block';
        entropyEl.textContent =
            // --- Entropy (FIX #4.1 – explicitly appending the string "log₁₀ guesses"---
            //`Entropy: ${data.entropy.toFixed(2)} log₁₀ guesses — ${data.entropy_explanation}`;  
            `Security level score: ${Math.min(data.entropy.toFixed(1), 20)}/20 — ${data.entropy_explanation}`;

        // --- Suggestions ---
        const sugHeader = document.getElementById('suggestions-header');
        const sugList   = document.getElementById('suggestions');
        sugHeader.style.display = 'block';
        sugList.innerHTML = '';

        data.ai_suggestions.forEach(s => {
            const li = document.createElement('li');
            li.textContent = s;
            sugList.appendChild(li);
        });

    } catch (err) {
        showError("Network error — could not analyze password.");
    }
}
</script>

</body>
</html>
